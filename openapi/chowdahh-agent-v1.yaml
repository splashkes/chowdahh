openapi: 3.1.0
info:
  title: Chowdahh Agent API
  version: 0.2.0-draft
  summary: Full draft contract for Chowdahh's AX-first agent surface.
  description: |
    This specification defines the draft v1 machine contract for Chowdahh.

    Core intent groups:
    - feed sessions
    - replay and stats
    - Chowdahh Radio
    - preferences
    - submissions
    - feedback

    The matching narrative contract is documented in
    `docs/api/contract-spec.md`.
servers:
  - url: https://chowdahh.com
tags:
  - name: Feed
    description: Start, inspect, and continue feed sessions.
  - name: Discovery
    description: Public lanes, topic lookup, curator lookup, and search.
  - name: Replay
    description: History and aggregated activity.
  - name: Radio
    description: Radio-mode session management.
  - name: Preferences
    description: Durable person-level Chowdahh preferences.
  - name: Submissions
    description: Content ingestion surfaces.
  - name: Signals
    description: Interaction event recording.
  - name: Feedback
    description: Content requests, bug reports, feature requests, and quality reports.
security:
  - bearerAuth: []
paths:
  /api/v1/feed-sessions:
    post:
      tags: [Feed]
      operationId: startFeedSession
      summary: Start a feed session for a person.
      description: |
        Creates a new feed session. This is the default "send content now"
        entrypoint for agents.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/AgentName'
        - $ref: '#/components/parameters/ActingFor'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedSessionStartRequest'
            examples:
              default:
                value:
                  intent: browse
                  budget_minutes: 5
                  include_controls: true
      responses:
        '201':
          $ref: '#/components/responses/FeedSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/feed-sessions/{session_id}:
    get:
      tags: [Feed]
      operationId: getFeedSession
      summary: Fetch an existing feed session.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          $ref: '#/components/responses/FeedSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/feed-sessions/{session_id}/more:
    post:
      tags: [Feed]
      operationId: continueFeedSession
      summary: Continue a feed session with more cards.
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedSessionMoreRequest'
            examples:
              default:
                value:
                  limit: 3
      responses:
        '200':
          $ref: '#/components/responses/FeedSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/feed-sessions/{session_id}/controls:
    patch:
      tags: [Feed]
      operationId: updateFeedSessionControls
      summary: Apply or remove controls on an active feed session.
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ControlUpdateRequest'
            examples:
              choose_topics:
                value:
                  set:
                    - topics:science
                    - tones:good-news
                  unset:
                    - topics:business
      responses:
        '200':
          $ref: '#/components/responses/FeedSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/streams/{stream_slug}:
    get:
      tags: [Discovery]
      operationId: getPublicStream
      summary: Read a public stream lane.
      security: []
      parameters:
        - $ref: '#/components/parameters/StreamSlug'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Public stream results.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamResponse'
  /api/v1/topics/{topic_id}:
    get:
      tags: [Discovery]
      operationId: getTopic
      summary: Fetch a topic with timeline, sources, and related topics.
      parameters:
        - $ref: '#/components/parameters/TopicId'
      responses:
        '200':
          description: Topic detail.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/search:
    get:
      tags: [Discovery]
      operationId: search
      summary: Search topics, sources, curators, and collections.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
            enum: [all, topics, sources, curators, collections]
            default: all
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Search results.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
  /api/v1/curators/{curator_id}:
    get:
      tags: [Discovery]
      operationId: getCurator
      summary: Fetch a curator profile.
      parameters:
        - $ref: '#/components/parameters/CuratorId'
      responses:
        '200':
          description: Curator detail.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Curator'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/replay:
    get:
      tags: [Replay]
      operationId: getReplay
      summary: Fetch ordered card history for the authenticated person.
      parameters:
        - name: signal_type
          in: query
          schema:
            $ref: '#/components/schemas/SignalType'
        - name: period
          in: query
          schema:
            $ref: '#/components/schemas/Period'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Replay history.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplayResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/stats/activity:
    get:
      tags: [Replay]
      operationId: getActivityStats
      summary: Query aggregated activity for the authenticated person.
      parameters:
        - name: signal_type
          in: query
          schema:
            $ref: '#/components/schemas/SignalType'
        - name: period
          in: query
          schema:
            $ref: '#/components/schemas/Period'
        - name: group_by
          in: query
          schema:
            type: string
            enum: [none, topic, source, curator]
            default: none
      responses:
        '200':
          description: Activity statistics.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityStatsResponse'
  /api/v1/radio-sessions:
    post:
      tags: [Radio]
      operationId: startRadioSession
      summary: Start a Chowdahh Radio session.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RadioSessionStartRequest'
      responses:
        '201':
          description: Radio session created.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RadioSessionResponse'
  /api/v1/radio-sessions/{radio_session_id}:
    get:
      tags: [Radio]
      operationId: getRadioSession
      summary: Fetch an existing radio session.
      parameters:
        - $ref: '#/components/parameters/RadioSessionId'
      responses:
        '200':
          description: Radio session detail.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RadioSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Radio]
      operationId: updateRadioSession
      summary: Update an active radio session.
      parameters:
        - $ref: '#/components/parameters/RadioSessionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RadioSessionUpdateRequest'
            examples:
              pause:
                value:
                  action: pause
              skip:
                value:
                  action: skip
      responses:
        '200':
          description: Radio session updated.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RadioSessionResponse'
  /api/v1/preferences/{person_id}:
    get:
      tags: [Preferences]
      operationId: getPreferences
      summary: Fetch durable Chowdahh preferences for a person.
      parameters:
        - $ref: '#/components/parameters/PersonId'
      responses:
        '200':
          description: Durable preferences.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferenceSyncResponse'
    put:
      tags: [Preferences]
      operationId: updatePreferences
      summary: Sync durable Chowdahh preferences for a person.
      parameters:
        - $ref: '#/components/parameters/PersonId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceSyncRequest'
      responses:
        '200':
          description: Preference sync result.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferenceSyncResponse'
  /api/v1/submissions/items:
    post:
      tags: [Submissions]
      operationId: submitItem
      summary: Submit a single item.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionItemRequest'
      responses:
        '202':
          description: Item accepted for processing.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/submissions/collections:
    post:
      tags: [Submissions]
      operationId: submitCollection
      summary: Submit a collection or corpus.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionCollectionRequest'
      responses:
        '202':
          description: Collection accepted for processing.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponse'
  /api/v1/submissions/{submission_id}:
    get:
      tags: [Submissions]
      operationId: getSubmission
      summary: Get submission processing state.
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: Submission state.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/signals:
    post:
      tags: [Signals]
      operationId: recordSignals
      summary: Record one or more interaction signals as a batch array.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              maxItems: 100
              items:
                $ref: '#/components/schemas/SignalRequest'
      responses:
        '202':
          description: Signal accepted.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
  /api/v1/feedback:
    post:
      tags: [Feedback]
      operationId: submitFeedback
      summary: Send a content request, bug report, feature request, or quality report.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
            examples:
              feature_request:
                value:
                  feedback_type: feature_request
                  title: Add a better handoff from replay into live feed
                  detail: When browsing prior cards, the agent should be able to jump back into send-more mode from the same topic.
      responses:
        '202':
          description: Feedback accepted.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Chowdahh token
      description: |
        Supports person-scoped and curator-scoped bearer tokens.
  headers:
    RequestId:
      description: Stable request identifier for debugging and support.
      schema:
        type: string
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
    AgentId:
      name: X-Chowdahh-Agent-Id
      in: header
      required: false
      schema:
        type: string
    AgentName:
      name: X-Chowdahh-Agent-Name
      in: header
      required: false
      schema:
        type: string
    ActingFor:
      name: X-Chowdahh-Acting-For
      in: header
      required: false
      schema:
        type: string
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
    RadioSessionId:
      name: radio_session_id
      in: path
      required: true
      schema:
        type: string
    PersonId:
      name: person_id
      in: path
      required: true
      schema:
        type: string
    TopicId:
      name: topic_id
      in: path
      required: true
      schema:
        type: string
    CuratorId:
      name: curator_id
      in: path
      required: true
      schema:
        type: string
    SubmissionId:
      name: submission_id
      in: path
      required: true
      schema:
        type: string
    StreamSlug:
      name: stream_slug
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
  responses:
    FeedSessionResponse:
      description: Feed session body.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FeedSessionResponse'
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_request:
              value:
                error:
                  code: invalid_request
                  message: Request body is malformed.
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: State conflict or idempotency mismatch.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Semantically invalid input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Rate limited.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Period:
      type: string
      enum: [today, last_7_days, this_month, last_month]
    SignalType:
      type: string
      enum: [seen, open, save, share, dismiss, source_open]
    Guidance:
      description: Contextual guidance returned with every response.
      type: object
      properties:
        status_explanation:
          type: string
        next_best_actions:
          type: array
          items:
            type: object
            properties:
              action_id:
                type: string
              title:
                type: string
              priority:
                type: string
              user_facing_prompt:
                type: string
              api_hint:
                type: object
                properties:
                  method:
                    type: string
                  path:
                    type: string
        account_state:
          type: object
          properties:
            auth_mode:
              type: string
              enum: [anonymous, person_token, curator_token]
            rate_limit:
              type: object
              properties:
                limit:
                  type: integer
                remaining:
                  type: integer
                reset_at:
                  type: string
                  format: date-time
    AcceptedResponse:
      type: object
      properties:
        status:
          type: string
          enum: [accepted]
        request_id:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
        meta:
          type: object
          properties:
            request_id:
              type: string
    FeedSessionStartRequest:
      type: object
      required: [intent]
      properties:
        intent:
          type: string
          enum: [browse]
        budget_minutes:
          type: integer
          minimum: 1
          maximum: 60
        include_controls:
          type: boolean
          default: true
    FeedSessionMoreRequest:
      type: object
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 20
          default: 3
    FeedSessionResponse:
      type: object
      required: [session_id, state]
      properties:
        session_id:
          type: string
        state:
          type: string
          enum: [active, complete, expired]
        items:
          type: array
          items:
            $ref: '#/components/schemas/ContentCard'
        controls:
          $ref: '#/components/schemas/ControlState'
        applied_preferences:
          type: object
          additionalProperties: true
        why_this_set:
          type: string
        expires_at:
          type: string
          format: date-time
        next_cursor:
          type: string
        has_more:
          type: boolean
      example:
        session_id: feed_sess_123
        state: active
        items:
          - card_id: card_1
            topic_id: topic_1
            headline: TSMC accelerates 1.4nm timeline
            summary: New manufacturing milestones moved the target schedule forward.
            source_url: https://example.com/tsmc
            source_name: Example News
            curator_id: curator_1
            curator_name: Tech Curator
            transformation_status: source-led
            topic_lenses: [science, business]
            tone_labels: [grounded]
            canonical_url: https://chowdahh.com/t/tsmc-14nm
            share_url: https://chowdahh.com/v/card_1
        controls:
          groups:
            - slug: topics
              label: Topics
              selection_mode: multi
              options:
                - slug: topics:science
                  label: Science
                  count: 12
                  selected: true
                  confidence: 1
        applied_preferences:
          delivery_mode: brief
        why_this_set: Balanced, current, and aligned with saved science preference.
        expires_at: '2026-04-11T23:45:00Z'
        next_cursor: cursor_2
        has_more: true
    StreamResponse:
      type: object
      properties:
        stream_slug:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ContentCard'
        next_cursor:
          type: string
        has_more:
          type: boolean
    SearchResponse:
      type: object
      properties:
        query:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              result_type:
                type: string
                enum: [topic, source, curator, collection]
              id:
                type: string
              title:
                type: string
              snippet:
                type: string
              url:
                type: string
                format: uri
        next_cursor:
          type: string
        has_more:
          type: boolean
    ContentCard:
      type: object
      required: [card_id, headline]
      properties:
        card_id:
          type: string
        topic_id:
          type: string
        headline:
          type: string
        summary:
          type: string
        source_url:
          type: string
          format: uri
        source_name:
          type: string
        curator_id:
          type: string
        curator_name:
          type: string
        transformation_status:
          type: string
          enum: [source-led, lightly-synthesized, fully-synthesized]
        topic_lenses:
          type: array
          items:
            type: string
        tone_labels:
          type: array
          items:
            type: string
        canonical_url:
          type: string
          format: uri
        image_url:
          description: Hero image URL for the card, when available.
          type: string
          format: uri
        share_url:
          type: string
          format: uri
        source_count:
          description: Number of distinct sources backing this card.
          type: integer
        domain_count:
          description: Number of distinct domains among sources.
          type: integer
        sources:
          description: >-
            Top sources backing this card. Each entry has a title, URL, and
            optional publisher/creator name. Ordered by relevance. May be
            truncated — use source_count for the true total.
          type: array
          items:
            $ref: '#/components/schemas/SourceReference'
    ControlState:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/ControlGroup'
    ControlGroup:
      type: object
      properties:
        slug:
          type: string
        label:
          type: string
        selection_mode:
          type: string
          enum: [single, multi]
        options:
          type: array
          items:
            $ref: '#/components/schemas/ControlOption'
    ControlOption:
      type: object
      properties:
        slug:
          type: string
        label:
          type: string
